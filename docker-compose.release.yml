# Prebuilt-image variant of docker-compose.yml — no clone, no build required.
# Download this file + .env.example from the GitHub Releases page, then:
#   cp .env.example .env  &&  edit .env  &&  docker compose -f docker-compose.release.yml up -d
#
# Set MUSICHUB_VERSION to pin a release (e.g. v0.1.0); defaults to latest.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/samedev/music-hub-backend:${MUSICHUB_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    volumes:
      - library_data:/data/library
      - backend_tmp:/data/tmp
      - backend_logs:/app/logs

  frontend:
    image: ghcr.io/samedev/music-hub-frontend:${MUSICHUB_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: ghcr.io/samedev/music-hub-nginx:${MUSICHUB_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend

volumes:
  pg_data:
  redis_data:
  library_data:
  backend_tmp:
  backend_logs:
