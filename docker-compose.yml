services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-musichub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-musichub}
      POSTGRES_DB: ${POSTGRES_DB:-musichub}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-musichub}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://musichub:musichub@postgres:5432/musichub}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      PORT: ${PORT:-3000}
      NODE_ENV: ${NODE_ENV:-production}
      JWT_SECRET: ${JWT_SECRET:-changeme_generate_a_long_random_secret}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-changeme_generate_a_different_long_random_secret}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      LIBRARY_PATH: ${LIBRARY_PATH:-/data/library}
      DOWNLOAD_TMP_PATH: ${DOWNLOAD_TMP_PATH:-/data/tmp}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme_use_a_strong_password}
    volumes:
      - library_data:/data/library
      - backend_tmp:/data/tmp
      - backend_logs:/app/logs

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-}
    depends_on:
      - backend

  nginx:
    build:
      context: ./docker
      dockerfile: nginx.Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend

volumes:
  pg_data:
  redis_data:
  library_data:
  backend_tmp:
  backend_logs:
