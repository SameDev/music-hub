name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    strategy:
      matrix:
        include:
          - name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
          - name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
          - name: nginx
            context: ./docker
            dockerfile: ./docker/nginx.Dockerfile
            platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - name: nginx
            context: ./docker
            dockerfile: ./docker/nginx.Dockerfile
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase repository owner
        id: owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }} (${{ matrix.platform }})
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner }}/music-hub-${{ matrix.name }}:${{ github.ref_name }}-${{ matrix.suffix }}

  merge-manifests:
    needs: build-and-push
    runs-on: ubuntu-latest
    strategy:
      matrix:
        name: [backend, frontend, nginx]
    steps:
      - name: Lowercase repository owner
        id: owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest for ${{ matrix.name }}
        run: |
          IMAGE=ghcr.io/${{ steps.owner.outputs.owner }}/music-hub-${{ matrix.name }}
          docker buildx imagetools create \
            -t "$IMAGE:${{ github.ref_name }}" \
            -t "$IMAGE:latest" \
            "$IMAGE:${{ github.ref_name }}-amd64" \
            "$IMAGE:${{ github.ref_name }}-arm64"

  release:
    needs: merge-manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            docker-compose.release.yml
            docker-compose.casaos.yml
            .env.example
          generate_release_notes: true
          body: |
            ## Run MusicHub with prebuilt images

            No clone, no build, no `.env` required. Download `docker-compose.release.yml`
            from this release's assets, then:

            ```bash
            docker compose -f docker-compose.release.yml up -d
            ```

            App available at `http://localhost:8095` (or your Tailscale/LAN address — see
            the README's CORS_ORIGIN note). Runs on default credentials out of the box,
            fine for a trusted home network (e.g. ZimaOS/NAS one-click deploys).

            Want your own secrets? Download `.env.example`, save it as `.env` next to
            the compose file, and edit only the values you want to override — anything
            you don't set falls back to the built-in default automatically.

            **CasaOS / ZimaOS one-click import**: use `docker-compose.casaos.yml` instead.
            CasaOS's importer doesn't resolve `${VAR:-default}` shell substitution, so that
            file has every default written as a plain literal value that CasaOS can show
            and let you edit directly in its install screen.

            Images published to `ghcr.io/${{ github.repository_owner }}/music-hub-{backend,frontend,nginx}`,
            built for `linux/amd64` and `linux/arm64`.
