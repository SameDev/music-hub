name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
          - name: nginx
            context: ./docker
            dockerfile: ./docker/nginx.Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase repository owner
        id: owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner }}/music-hub-${{ matrix.name }}:${{ github.ref_name }}
            ghcr.io/${{ steps.owner.outputs.owner }}/music-hub-${{ matrix.name }}:latest

  release:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            docker-compose.release.yml
            .env.example
          generate_release_notes: true
          body: |
            ## Run MusicHub with prebuilt images

            No clone, no build. Download `docker-compose.release.yml` and `.env.example`
            from this release's assets, then:

            ```bash
            mv docker-compose.release.yml docker-compose.yml
            cp .env.example .env
            # edit .env — set real secrets, at minimum JWT_SECRET/JWT_REFRESH_SECRET/
            # POSTGRES_PASSWORD/ADMIN_PASSWORD
            docker compose up -d
            ```

            App available at `http://localhost` (or your Tailscale/LAN address — see
            the README's CORS_ORIGIN note).

            Images published to `ghcr.io/${{ github.repository_owner }}/music-hub-{backend,frontend,nginx}`,
            built for `linux/amd64` and `linux/arm64`.
