# CasaOS/ZimaOS one-click import variant of docker-compose.release.yml.
#
# CasaOS's compose importer is not a full YAML/compose implementation —
# it has broken on every one of these in turn:
#
# 1. Shell-style ${VAR:-default} substitution — copies the literal string
#    (including "${" and "}") into the container's environment, breaking
#    Postgres auth, JWT secrets, and port mapping. Every value below is a
#    plain literal instead, so CasaOS pre-fills its install screen with a
#    working default and you edit whichever ones you want (password,
#    library path, port) directly in that UI before deploying.
# 2. Docker-managed named volumes (top-level `volumes:` with no host path)
#    — CasaOS always renders these as bind mounts and needs an explicit
#    host directory, otherwise it fails with `field Source must not be
#    empty`. Every volume below is a literal host path under
#    /DATA/AppData/lunare/ instead.
# 3. `depends_on` with the extended `condition: service_healthy` form —
#    CasaOS's parser doesn't understand it and silently drops every
#    service after the one that trips on it. Plain list form only.
# 4. Unquoted values containing multiple ":" (e.g. a postgres:// URL) —
#    quote every environment value defensively. Optional/blank vars
#    (CORS_ORIGIN, VITE_API_URL) are omitted entirely rather than set to
#    an empty string, for the same reason.
#
# Using plain `docker compose`? Use docker-compose.release.yml instead — it
# supports .env overrides via ${VAR:-default} and proper health-gated startup.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: "lunare"
      POSTGRES_PASSWORD: "lunare"
      POSTGRES_DB: "lunare"
    volumes:
      - /DATA/AppData/lunare/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lunare"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - /DATA/AppData/lunare/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/samedev/lunare-backend:latest
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: "postgresql://lunare:lunare@postgres:5432/lunare"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      PORT: "3000"
      NODE_ENV: "production"
      JWT_SECRET: "changeme_generate_a_long_random_secret"
      JWT_ACCESS_EXPIRES_IN: "15m"
      JWT_REFRESH_SECRET: "changeme_generate_a_different_long_random_secret"
      JWT_REFRESH_EXPIRES_IN: "7d"
      LIBRARY_PATH: "/data/library"
      DOWNLOAD_TMP_PATH: "/data/tmp"
      ADMIN_EMAIL: "admin@example.com"
      ADMIN_PASSWORD: "changeme_use_a_strong_password"
    volumes:
      - /DATA/Media/Music:/data/library
      - /DATA/AppData/lunare/backend-tmp:/data/tmp
      - /DATA/AppData/lunare/backend-logs:/app/logs

  frontend:
    image: ghcr.io/samedev/lunare-frontend:latest
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: ghcr.io/samedev/lunare-nginx:latest
    restart: unless-stopped
    ports:
      - target: 80
        published: 8095
        protocol: tcp
    depends_on:
      - frontend
      - backend

x-casaos:
  id: com.github.samedev.lunare
  architectures:
    - amd64
    - arm64
  main: nginx
  author: SameDev
  category: Media
  developer: SameDev
  icon: https://raw.githubusercontent.com/SameDev/lunare/main/frontend/public/pwa-512x512.png
  title:
    en_US: Lunare
    pt_BR: Lunare
  tagline:
    en_US: Self-hosted music library server for homelabs
    pt_BR: Servidor de biblioteca de música self-hosted para homelabs
  description:
    en_US: Organize, stream, tag, and manage your personal music collection through a modern web interface.
    pt_BR: Organize, transmita, edite tags e gerencie sua coleção pessoal de música por uma interface web moderna.
  index: /
  port_map: "8095"
