name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
          - name: nginx
            context: ./docker
            dockerfile: ./docker/nginx.Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase repository owner
        id: owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner }}/music-hub-${{ matrix.name }}:${{ github.ref_name }}
            ghcr.io/${{ steps.owner.outputs.owner }}/music-hub-${{ matrix.name }}:latest

  release:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            docker-compose.release.yml
            .env.example
          generate_release_notes: true
          body: |
            ## Run MusicHub with prebuilt images

            No clone, no build, no `.env` required. Download `docker-compose.release.yml`
            from this release's assets, then:

            ```bash
            docker compose -f docker-compose.release.yml up -d
            ```

            App available at `http://localhost` (or your Tailscale/LAN address — see
            the README's CORS_ORIGIN note). Runs on default credentials out of the box,
            fine for a trusted home network (e.g. ZimaOS/NAS one-click deploys).

            Want your own secrets? Download `.env.example`, save it as `.env` next to
            the compose file, and edit only the values you want to override — anything
            you don't set falls back to the built-in default automatically.

            Images published to `ghcr.io/${{ github.repository_owner }}/music-hub-{backend,frontend,nginx}`,
            built for `linux/amd64` and `linux/arm64`.
