# CasaOS/ZimaOS one-click import variant of docker-compose.release.yml.
#
# CasaOS's compose importer does not resolve shell-style ${VAR:-default}
# substitution — it copies the literal string (including the "${" and "}")
# into the container's environment, which breaks Postgres auth, JWT secrets,
# and port mapping. Every value below is a plain literal instead, so CasaOS
# pre-fills its install-screen fields with a working default and you edit
# whichever ones you want (password, library path, port) directly in that
# UI before deploying.
#
# Using plain `docker compose`? Use docker-compose.release.yml instead — it
# supports .env overrides via ${VAR:-default}.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: musichub
      POSTGRES_PASSWORD: musichub
      POSTGRES_DB: musichub
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U musichub"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/samedev/music-hub-backend:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://musichub:musichub@postgres:5432/musichub
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3000
      NODE_ENV: production
      JWT_SECRET: changeme_generate_a_long_random_secret
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: changeme_generate_a_different_long_random_secret
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: ""
      LIBRARY_PATH: /data/library
      DOWNLOAD_TMP_PATH: /data/tmp
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: changeme_use_a_strong_password
    volumes:
      - /DATA/Media/Music:/data/library
      - backend_tmp:/data/tmp
      - backend_logs:/app/logs

  frontend:
    image: ghcr.io/samedev/music-hub-frontend:latest
    restart: unless-stopped
    environment:
      VITE_API_URL: ""
    depends_on:
      - backend

  nginx:
    image: ghcr.io/samedev/music-hub-nginx:latest
    restart: unless-stopped
    ports:
      - target: 80
        published: 8095
        protocol: tcp
    depends_on:
      - frontend
      - backend

volumes:
  pg_data:
  redis_data:
  backend_tmp:
  backend_logs:
